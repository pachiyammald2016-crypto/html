<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Combining CSS Selectors</title>
  <link rel="stylesheet" href="./style.css">
</head>

<style>
  h1,h2{
    color: blueviolet;
  }
  div>p{
    color: firebrick;
  }
  div li{
    color: blue;
  }
  li.done{
    color: seagreen;
  }
  ul>p.done{
    font-size: 1rem;
    color: purple;
    font-weight: 1000;
  }

</style>

<body>
  <h1>To Do List</h1>
  <h2>Monday</h2>
  <div class="box">
    <p class="done">Do these things today!</p>
    <ul class="list">
      <li>Wash Clothes</li>
      <li class="done">Read</li>
      <li class="done">Maths Questions</li>
    </ul>
  </div>

  <ul>
    <p class="done">Other items</p>
  </ul>
  <p>The best preparation for tomorrow is doing your best today.</p>

</body>

</html>
